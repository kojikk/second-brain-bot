# Второй-мозг-бот на kojikk-server.
#
# Безопасность (§6 инфра-плана):
#  - non-root (Dockerfile USER), no-new-privileges, cap_drop ALL;
#  - секреты — Docker secrets (файлы), не литералы в env;
#  - egress к Telegram/Anthropic — через singbox-прокси (host:8082);
#  - durable-очередь на persistent volume (переживает пересоздание контейнера).
#
# Прокси: singbox слушает 0.0.0.0:8082 на хосте. Свой compose-проект получает
# СОБСТВЕННЫЙ bridge со своим gateway (не 172.22.0.1, как у notion-agent), поэтому
# адресуем прокси через host-gateway-алиас, а не хардкодом IP.
#
# Vault MCP (LAN) идёт МИМО прокси. Сам MCP-клиент использует trust_env=False
# (надёжно), а NO_PROXY ниже — defense-in-depth с ЛИТЕРАЛЬНЫМ IP Desktop, т.к.
# httpx не матчит CIDR-подсети в NO_PROXY.
services:
  second-brain-bot:
    build: .
    image: second-brain-bot:latest
    container_name: second-brain-bot
    restart: unless-stopped
    user: "10001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file:
      - .env
    extra_hosts:
      - "proxy-host:host-gateway"
    environment:
      - HTTP_PROXY=http://proxy-host:8082
      - HTTPS_PROXY=http://proxy-host:8082
      - http_proxy=http://proxy-host:8082
      - https_proxy=http://proxy-host:8082
      # Vault MCP (LAN) и localhost — мимо прокси (литеральный IP + CIDR).
      - NO_PROXY=192.168.1.50,192.168.1.0/24,127.0.0.1,localhost
      - no_proxy=192.168.1.50,192.168.1.0/24,127.0.0.1,localhost
      - MCP_TOKEN_FILE=/run/secrets/mcp_token
      - TELEGRAM_BOT_TOKEN_FILE=/run/secrets/telegram_token
      - CLAUDE_API_KEY_FILE=/run/secrets/claude_api_key
      - QUEUE_DB_PATH=/app/data/queue.db
      - USAGE_DB_PATH=/app/data/usage.db
    secrets:
      - mcp_token
      - telegram_token
      - claude_api_key
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

secrets:
  mcp_token:
    file: ./secrets/mcp_token
  telegram_token:
    file: ./secrets/telegram_token
  claude_api_key:
    file: ./secrets/claude_api_key
