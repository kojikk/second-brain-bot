<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Граф вольта</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/vendor/force-graph.min.js"></script>
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/purify.min.js"></script>
<style>
  /* ── палитра: тёмный графит, приглушённые «дорогие» пастели ── */
  :root {
    --bg: #141416;
    --panel: rgba(29, 29, 33, .94);
    --panel-solid: #1d1d21;
    --panel-2: #26262c;
    --border: #2c2c33;
    --text: #d6d6dc;
    --muted: #8b8b94;
    --faint: #5a5a63;
    --accent: #8f7ee0;
    --accent-dim: rgba(143, 126, 224, .16);
    --new: #6fae8a;
    --touched: #c2a368;
    --danger: #c07a7a;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }
  body {
    color: var(--text);
    font: 14px/1.5 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #graph { position: absolute; inset: 0; }

  /* ── верхняя панель ── */
  #top {
    position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    padding: calc(env(safe-area-inset-top, 0px) + 10px) 12px 0;
    display: flex; flex-direction: column; gap: 8px; pointer-events: none;
  }
  #top > * { pointer-events: auto; }
  #searchbox { position: relative; }
  #search {
    width: 100%; padding: 10px 14px; font-size: 14px; color: var(--text);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--radius); outline: none;
    transition: border-color .18s ease;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--faint); }
  #suggest {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--panel-solid); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; display: none;
    box-shadow: 0 12px 32px rgba(0,0,0,.45);
  }
  #suggest .sug {
    padding: 9px 14px; cursor: pointer; display: flex; gap: 8px; align-items: center;
    border-bottom: 1px solid var(--border); font-size: 13.5px;
  }
  #suggest .sug:last-child { border-bottom: 0; }
  #suggest .sug:active, #suggest .sug:hover { background: var(--panel-2); }
  #suggest .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  #suggest .kind { margin-left: auto; color: var(--faint); font-size: 11.5px; }

  /* один ряд: на узких экранах не переносим (иначе мета-пузырь «съезжает»
     на строку ниже), а горизонтально прокручиваем */
  #bar {
    display: flex; gap: 6px; align-items: center;
    flex-wrap: nowrap; overflow-x: auto;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  #bar::-webkit-scrollbar { display: none; }

  /* ── сегментированный переключатель неймспейса (знания ↔ код) ── */
  #ns {
    display: inline-flex; flex: none; padding: 3px; gap: 2px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 999px;
  }
  #ns .seg {
    padding: 5px 13px; font-size: 12px; color: var(--muted);
    border-radius: 999px; cursor: pointer; user-select: none;
    transition: color .18s, background .18s;
  }
  #ns .seg.on { color: var(--text); background: var(--accent-dim); }

  .chip {
    display: inline-flex; align-items: center; gap: 7px; flex: none;
    padding: 6px 11px; font-size: 12px; color: var(--muted);
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 999px; cursor: pointer; user-select: none;
    transition: color .18s, border-color .18s, background .18s;
  }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; }
  .chip.on { color: var(--text); border-color: var(--accent); background: var(--accent-dim); }
  .chip b { font-weight: 600; }

  /* выпадашка выбора проекта (код-режим) */
  select.chip {
    -webkit-appearance: none; appearance: none;
    padding-right: 26px; max-width: 46vw; text-overflow: ellipsis;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%238b8b94' stroke-width='1.4' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat; background-position: right 10px center;
  }
  select.chip.on { color: var(--text); border-color: var(--accent); background-color: var(--accent-dim); }
  select.chip option { color: var(--text); background: var(--panel-solid); }
  #meta {
    margin-left: auto; flex: none; font-size: 11.5px; color: var(--faint);
    background: var(--panel); border: 1px solid var(--border);
    padding: 6px 11px; border-radius: 999px; white-space: nowrap;
  }
  #meta .stale { color: var(--touched); }

  /* ── нижний лист ── */
  #sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 6;
    background: var(--panel-solid);
    border: 1px solid var(--border); border-bottom: 0;
    border-radius: 16px 16px 0 0;
    transform: translateY(102%);
    transition: transform .28s cubic-bezier(.32,.72,.33,1);
    max-height: 68%; display: flex; flex-direction: column;
    box-shadow: 0 -16px 48px rgba(0,0,0,.5);
  }
  #sheet.open { transform: translateY(0); }
  #sheet-head { padding: 10px 18px 10px; flex: none; cursor: pointer; }
  #grip { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 12px; }
  #sheet-title { font-size: 16.5px; font-weight: 650; letter-spacing: .1px; word-break: break-word; }
  #badges { display: flex; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; padding: 3px 9px; border-radius: 999px;
    color: var(--muted); background: var(--panel-2); border: 1px solid var(--border);
  }
  .badge.acc { color: var(--accent); border-color: transparent; background: var(--accent-dim); }
  .badge.new { color: var(--new); background: rgba(111,174,138,.12); border-color: transparent; }
  .badge.touched { color: var(--touched); background: rgba(194,163,104,.12); border-color: transparent; }
  #sheet-body { overflow-y: auto; padding: 0 18px 20px; overscroll-behavior: contain; }
  .sec { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--faint); margin: 14px 0 6px; }
  .conn {
    display: flex; gap: 10px; align-items: baseline; padding: 8px 0;
    border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13.5px;
  }
  .conn:last-child { border-bottom: 0; }
  .conn .rel { flex: none; min-width: 92px; font-size: 12px; color: var(--muted); }
  .conn .rel.sem { color: var(--accent); }
  .conn .who { word-break: break-word; }
  .conn .who .cdot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 7px; }
  .btn {
    display: block; width: 100%; margin: 14px 0 4px; padding: 11px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--panel-2); color: var(--text);
    font-size: 14px; font-weight: 550; cursor: pointer;
    transition: background .18s, border-color .18s;
  }
  .btn:active { background: var(--accent-dim); border-color: var(--accent); }
  .btn[disabled] { opacity: .45; }

  /* ── markdown-превью ── */
  #preview {
    display: none; margin-top: 12px; padding: 14px 16px;
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 13.5px; line-height: 1.65; word-break: break-word;
  }
  #preview h1, #preview h2, #preview h3, #preview h4 {
    font-size: 14.5px; font-weight: 650; margin: 14px 0 6px; color: var(--text);
  }
  #preview h1 { font-size: 16px; }
  #preview h1:first-child, #preview h2:first-child { margin-top: 0; }
  #preview p { margin: 7px 0; }
  #preview ul, #preview ol { margin: 7px 0; padding-left: 22px; }
  #preview li { margin: 3px 0; }
  #preview code {
    font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background: var(--panel-2); padding: 1.5px 5px; border-radius: 5px;
  }
  #preview pre {
    background: var(--panel-2); border: 1px solid var(--border);
    padding: 10px 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0;
  }
  #preview pre code { background: none; padding: 0; }
  #preview blockquote {
    border-left: 2px solid var(--accent); margin: 8px 0; padding: 2px 0 2px 12px;
    color: var(--muted);
  }
  #preview a { color: var(--accent); text-decoration: none; }
  #preview a.wl { border-bottom: 1px dashed rgba(143,126,224,.5); cursor: pointer; }
  #preview hr { border: 0; border-top: 1px solid var(--border); margin: 12px 0; }
  #preview table { border-collapse: collapse; margin: 8px 0; }
  #preview td, #preview th { border: 1px solid var(--border); padding: 4px 9px; font-size: 12.5px; }
  #preview .trunc { color: var(--faint); font-size: 12px; margin-top: 10px; }

  /* ── оверлей загрузки ── */
  #overlay {
    position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: var(--bg); color: var(--muted); text-align: center; padding: 24px;
  }
  .spin {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border); border-top-color: var(--accent);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="graph"></div>

<div id="top">
  <div id="searchbox">
    <input id="search" type="search" placeholder="Найти узел…" autocomplete="off">
    <div id="suggest"></div>
  </div>
  <div id="bar">
    <span id="ns">
      <span class="seg on" id="ns-kb">Знания</span>
      <span class="seg" id="ns-code">Код</span>
    </span>
    <select class="chip" id="proj" style="display:none" title="Проект код-графа"></select>
    <span class="chip" id="chip-new"><span class="dot" style="background:var(--new)"></span>новые <b id="n-new">0</b></span>
    <span class="chip" id="chip-touched"><span class="dot" style="background:var(--touched)"></span>изменённые <b id="n-touched">0</b></span>
    <span class="chip" id="chip-labels">связи</span>
    <span id="meta"></span>
  </div>
</div>

<div id="sheet">
  <div id="sheet-head">
    <div id="grip"></div>
    <div id="sheet-title"></div>
    <div id="badges"></div>
  </div>
  <div id="sheet-body">
    <div id="conns"></div>
    <button class="btn" id="open-note" type="button">Открыть заметку</button>
    <div id="preview"></div>
  </div>
</div>

<div id="overlay"><div class="spin"></div><div id="overlay-text">Загружаю граф…</div></div>

<script>
"use strict";
const tg = window.Telegram?.WebApp;
tg?.ready(); tg?.expand();
tg?.setBackgroundColor?.("#141416"); tg?.setHeaderColor?.("#141416");

const $ = (id) => document.getElementById(id);
const DEMO = new URLSearchParams(location.search).has("demo");

/* код-режим грузит все проекты сразу (code:*) и кластеризует по проекту */
const CODE_ALL_NS = "code:*";

/* приглушённые пастели на графите — по сообществам Louvain */
const PALETTE = ["#9aa7c0", "#c0a98a", "#8fbba0", "#c08f9b", "#a796cf",
                 "#8fb0c0", "#c0b88a", "#b194c0", "#c09a8a", "#8fc0b6"];
const COL = {
  bg: "#141416", text: "#d6d6dc", muted: "#8b8b94", faint: "#5a5a63",
  accent: "#8f7ee0", new: "#6fae8a", touched: "#c2a368",
  edge: "rgba(255,255,255,0.10)", panel: "#1d1d21",
};
const KIND_RU = { note: "заметка", org: "папка-узел", tag: "тег", concept: "концепт без страницы" };
const CODE_RU = { module: "модуль", class: "класс", function: "функция", method: "метод", note: "заметка" };

const S = {
  ns: "kb",
  nodes: [], links: [], byId: new Map(), neighbors: new Map(),
  newSet: new Set(), touchedSet: new Set(), newEdges: new Set(),
  selected: null, hovered: null,
  filterNew: false, filterTouched: false, alwaysEdgeLabels: false,
  projectFilter: null,
  term: "", zoom: 1,
};
const isCode = () => S.ns !== "kb";
let Graph = null;

/* ── данные ── */
async function api(path, body) {
  const r = await fetch(path, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ initData: tg?.initData || "", ...body }),
  });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || ("HTTP " + r.status));
  return r.json();
}

function demoData() {
  const mk = (id, kind, community, degree, entity) =>
    ({ id, kind, label: id.replace(/\.md$/, "").split("/").pop(), entity: !!entity, degree, community });
  const nodes = [
    mk("Проекты/Бот/_home.md", "org", 0, 6, false), mk("Знания/AI/RAG.md", "note", 1, 5, true),
    mk("Знания/AI/Эмбеддинги.md", "note", 1, 3, true), mk("Знания/AI/LLM.md", "note", 1, 4, true),
    mk("Проекты/Вишлист.md", "note", 2, 4, true), mk("Проекты/Оркестратор.md", "note", 2, 3, true),
    mk("tag:ai", "tag", 1, 3), mk("concept:graphify", "concept", 1, 1),
    mk("Журнал/2026-06-12.md", "note", 0, 2), mk("Знания/Граф.md", "note", 1, 4, true),
  ];
  const e = (src, tgt, relation, layer) => ({ src, tgt, relation, layer, confidence: "extracted" });
  const edges = [
    e("Проекты/Бот/_home.md", "Знания/AI/RAG.md", "использует", "semantic"),
    e("Знания/AI/RAG.md", "Знания/AI/Эмбеддинги.md", "опирается на", "semantic"),
    e("Знания/AI/RAG.md", "Знания/AI/LLM.md", "ссылается", "derived"),
    e("Знания/AI/LLM.md", "tag:ai", "тег", "derived"),
    e("Знания/AI/Эмбеддинги.md", "tag:ai", "тег", "derived"),
    e("Проекты/Вишлист.md", "Проекты/Оркестратор.md", "обслуживается", "semantic"),
    e("Проекты/Бот/_home.md", "Журнал/2026-06-12.md", "ссылается", "derived"),
    e("Знания/Граф.md", "concept:graphify", "вдохновлён", "semantic"),
    e("Знания/AI/RAG.md", "Знания/Граф.md", "ссылается", "derived"),
    e("Проекты/Бот/_home.md", "Знания/Граф.md", "визуализирует", "semantic"),
  ];
  return {
    stale: false,
    graph: { generated: new Date().toISOString(), stats: { nodes: nodes.length, edges: edges.length }, nodes, edges },
    diff: { new_nodes: ["Знания/Граф.md"], touched_nodes: ["Знания/AI/RAG.md"],
            new_edges: [{ src: "Проекты/Бот/_home.md", tgt: "Знания/Граф.md" }], baseline: "demo" },
  };
}

function codeDemoData() {
  /* два проекта — чтобы видеть кластеры по проекту + выпадашку с подсветкой */
  const nodes = [], edges = [];
  const e = (src, tgt, rel) => edges.push({ src, tgt, relation: rel, layer: "code", confidence: "extracted" });
  const proj = (name, idx, defs) => {
    const pre = name + "::";
    const mk = (id, codeKind, degree) => nodes.push(
      { id: pre + id, kind: "code", codeKind, project: name, community: idx, degree,
        label: id.includes("#") ? id.split("#")[1] : id, entity: false, file: id.split("#")[0] });
    for (const [id, kind, deg] of defs) mk(id, kind, deg);
    return pre;
  };
  const a = proj("second-brain-bot", 0, [
    ["worker.py", "module", 5], ["worker.py#run_worker", "function", 2],
    ["worker.py#_process", "function", 3], ["agent.py", "module", 4],
    ["agent.py#run_loop", "function", 2], ["mcp_client.py", "module", 3],
    ["mcp_client.py#MCPClient", "class", 1],
  ]);
  e(a + "worker.py", a + "worker.py#run_worker", "defines");
  e(a + "worker.py", a + "worker.py#_process", "defines");
  e(a + "agent.py", a + "agent.py#run_loop", "defines");
  e(a + "mcp_client.py", a + "mcp_client.py#MCPClient", "defines");
  e(a + "worker.py", a + "agent.py", "imports");
  e(a + "worker.py", a + "mcp_client.py", "imports");
  e(a + "worker.py#_process", a + "agent.py#run_loop", "calls");
  e(a + "agent.py#run_loop", a + "mcp_client.py#MCPClient", "calls");
  const b = proj("fleetpanel", 1, [
    ["lib/server-manager.ts", "module", 4], ["lib/server-manager.ts#createServer", "function", 3],
    ["lib/docker.ts", "module", 3], ["lib/docker.ts#createContainer", "function", 2],
    ["app/api/route.ts", "module", 2],
  ]);
  e(b + "lib/server-manager.ts", b + "lib/server-manager.ts#createServer", "defines");
  e(b + "lib/docker.ts", b + "lib/docker.ts#createContainer", "defines");
  e(b + "lib/server-manager.ts", b + "lib/docker.ts", "imports");
  e(b + "lib/server-manager.ts#createServer", b + "lib/docker.ts#createContainer", "calls");
  e(b + "app/api/route.ts", b + "lib/server-manager.ts#createServer", "calls");
  return {
    stale: false,
    graph: { generated: new Date().toISOString(), meta: { projects: ["second-brain-bot", "fleetpanel"] },
             stats: { nodes: nodes.length, edges: edges.length }, nodes, edges },
    diff: { new_nodes: [b + "app/api/route.ts"], touched_nodes: [],
            new_edges: [{ src: b + "app/api/route.ts", tgt: b + "lib/server-manager.ts#createServer" }], baseline: "demo" },
  };
}

async function loadNs(ns) {
  S.ns = ns;
  $("ns-kb").classList.toggle("on", ns === "kb");
  $("ns-code").classList.toggle("on", ns !== "kb");
  /* переключение неймспейса начинает вид с чистого листа */
  S.selected = null; S.term = ""; $("search").value = "";
  S.filterNew = false; S.filterTouched = false; S.projectFilter = null;
  $("chip-new").classList.remove("on"); $("chip-touched").classList.remove("on");
  $("proj").classList.remove("on");
  $("proj").style.display = ns === CODE_ALL_NS ? "" : "none";
  $("overlay").style.display = "flex";
  $("overlay-text").textContent = ns === "kb" ? "Загружаю граф знаний…" : "Загружаю код-граф…";
  document.querySelector(".spin").style.display = "";
  try {
    const data = DEMO
      ? (ns === "kb" ? demoData() : codeDemoData())
      : await api("/api/graph", ns === "kb" ? {} : { ns });
    init(data);
    $("overlay").style.display = "none";
  } catch (e) {
    $("overlay-text").textContent = "Не получилось: " + e.message;
    document.querySelector(".spin").style.display = "none";
  }
}

const load = () => loadNs("kb");

$("ns-kb").onclick = () => { if (S.ns !== "kb") loadNs("kb"); };
$("ns-code").onclick = () => { if (S.ns !== CODE_ALL_NS) loadNs(CODE_ALL_NS); };

/* выпадашка проектов код-режима: заполнение + выбор-подсветка */
function populateProjects(projects) {
  const sel = $("proj");
  sel.innerHTML = "";
  const all = document.createElement("option");
  all.value = ""; all.textContent = "Все проекты"; sel.append(all);
  for (const p of projects) {
    const o = document.createElement("option"); o.value = p; o.textContent = p; sel.append(o);
  }
  sel.value = S.projectFilter || "";
  sel.classList.toggle("on", !!S.projectFilter);
}
$("proj").onchange = (ev) => {
  S.projectFilter = ev.target.value || null;
  $("proj").classList.toggle("on", !!S.projectFilter);
  select(null);
  if (S.projectFilter) {
    S._userMoved = false;
    setTimeout(() => { if (!S._userMoved)
      Graph.zoomToFit(600, Math.min(innerWidth, innerHeight) * 0.12, (n) => n.project === S.projectFilter); }, 60);
  } else {
    S._userMoved = false; fitOnce(600);
  }
};

function nodeColor(n) {
  if (n.kind === "tag") return "#6e6e78";
  if (n.kind === "concept") return COL.faint;
  return PALETTE[(n.community ?? 0) % PALETTE.length];
}
const nodeR = (n) => Math.min(3 + Math.sqrt(n.degree || 1) * 1.7, 14);

function init(data) {
  const g = data.graph, diff = data.diff || {};
  S.newSet = new Set(diff.new_nodes || []);
  S.touchedSet = new Set(diff.touched_nodes || []);
  S.newEdges = new Set((diff.new_edges || []).map((e) => e.src + "|" + e.tgt));

  S.nodes = g.nodes.map((n) => ({ ...n, r: nodeR(n) }));
  S.byId = new Map(S.nodes.map((n) => [n.id, n]));
  S.links = g.edges
    .filter((e) => S.byId.has(e.src) && S.byId.has(e.tgt))
    .map((e) => ({ source: e.src, target: e.tgt, relation: e.relation,
                   layer: e.layer, isNew: S.newEdges.has(e.src + "|" + e.tgt) }));
  S.neighbors = new Map(S.nodes.map((n) => [n.id, new Set()]));
  for (const l of S.links) {
    S.neighbors.get(l.source).add(l.target);
    S.neighbors.get(l.target).add(l.source);
  }

  $("n-new").textContent = S.newSet.size;
  $("n-touched").textContent = S.touchedSet.size;
  const when = (g.generated || "").slice(0, 16).replace("T", " ");
  let metaTxt = `${g.stats.nodes} узлов · ${g.stats.edges} связей`;
  if (S.ns === CODE_ALL_NS) {
    const projects = (g.meta && g.meta.projects) || [];
    populateProjects(projects);
    metaTxt = `${projects.length} проектов · ` + metaTxt;
  }
  $("meta").innerHTML = metaTxt + (data.stale ? ` · <span class="stale">офлайн</span>` : "");
  $("meta").title = when;

  if (!Graph) {
    buildGraph();
  } else {
    /* переключение неймспейса — переиспользуем движок, меняем только данные */
    select(null);
    Graph.graphData({ nodes: S.nodes, links: S.links });
    S._userMoved = false;
    setTimeout(() => fitOnce(600), 350);
  }
}

/* ── force-graph: плавная d3-физика вместо самописной ── */
function buildGraph() {
  Graph = ForceGraph()($("graph"))
    .graphData({ nodes: S.nodes, links: S.links })
    .backgroundColor(COL.bg)
    .nodeId("id")
    .nodeVal((n) => n.r)
    .autoPauseRedraw(false)
    .warmupTicks(150)
    .cooldownTime(5000)
    .d3VelocityDecay(0.55)              /* спокойнее: меньше дрожи и разлёта */
    .nodeCanvasObject(paintNode)
    .nodePointerAreaPaint((n, color, ctx) => {
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r + 6, 0, 2 * Math.PI); ctx.fill();
    })
    .linkColor((l) => linkStyle(l).color)
    .linkWidth((l) => linkStyle(l).width)
    .linkCanvasObjectMode(() => "after")
    .linkCanvasObject(paintLinkLabel)
    .onNodeClick((n) => select(n))
    .onNodeHover((n) => { S.hovered = n || null; })
    .onBackgroundClick(() => select(null))
    .onNodeDragEnd((n) => { n.fx = null; n.fy = null; })  /* не прибивать узлы */
    .onZoom(({ k }) => { S.zoom = k; })
    .onEngineStop(() => fitOnce(600));

  /* warmupTicks уже уложил граф — показываем сразу по центру, не ждём cooldown */
  setTimeout(() => fitOnce(500), 400);
  $("graph").addEventListener("pointerdown", () => { S._userMoved = true; }, { once: true });

  /* разреженный, дышащий layout: сильнее отталкивание, длиннее связи */
  Graph.d3Force("charge").strength(-170).distanceMax(420);
  Graph.d3Force("link")
    .distance((l) => l.layer === "semantic" ? 95
                   : l.layer === "code" ? (l.relation === "imports" ? 92 : 32) : 60)
    .strength((l) => l.layer === "semantic" ? 0.7
                   : l.layer === "code" ? (l.relation === "imports" ? 0.22 : 0.9) : 0.35);
  Graph.d3Force("center").strength(0.04);
}

function fitOnce(ms) {
  /* первый показ + дофит после остановки движка, пока юзер не взял управление */
  if (S._userMoved) return;
  Graph.zoomToFit(ms, Math.min(innerWidth, innerHeight) * 0.12);
}

function isDim(n) {
  if (S.term) return !n.label.toLowerCase().includes(S.term);
  if (S.filterNew || S.filterTouched) {
    return !((S.filterNew && S.newSet.has(n.id)) ||
             (S.filterTouched && S.touchedSet.has(n.id)));
  }
  if (S.selected) {
    return n.id !== S.selected.id && !S.neighbors.get(S.selected.id)?.has(n.id);
  }
  if (S.projectFilter) return n.project !== S.projectFilter;
  return false;
}

function linkStyle(l) {
  const sid = typeof l.source === "object" ? l.source.id : l.source;
  const tid = typeof l.target === "object" ? l.target.id : l.target;
  const sel = S.selected && (sid === S.selected.id || tid === S.selected.id);
  const bothDim = isDim(S.byId.get(sid)) && isDim(S.byId.get(tid));
  if (bothDim) return { color: "rgba(255,255,255,0.025)", width: 0.4 };
  if (l.isNew) return { color: "rgba(111,174,138,0.75)", width: sel ? 1.8 : 1.3 };
  if (l.layer === "code") {
    const r = l.relation;
    if (r === "calls")                     /* поведение — основной сигнал (акцент) */
      return { color: sel ? "rgba(143,126,224,0.95)" : "rgba(143,126,224,0.5)", width: sel ? 1.8 : 1.0 };
    if (r === "imports")                    /* зависимости модулей (синий) */
      return { color: sel ? "rgba(122,162,224,0.9)" : "rgba(122,162,224,0.42)", width: sel ? 1.7 : 1.0 };
    if (r === "defines")                    /* скелет модуль→символ (еле виден) */
      return { color: sel ? "rgba(255,255,255,0.22)" : "rgba(255,255,255,0.05)", width: sel ? 0.9 : 0.4 };
    /* instantiates / extends / decorates / references — тёплый приглушённый */
    return { color: sel ? "rgba(190,165,120,0.85)" : "rgba(190,165,120,0.34)", width: sel ? 1.4 : 0.8 };
  }
  if (l.layer === "semantic")
    return { color: sel ? "rgba(143,126,224,0.9)" : "rgba(143,126,224,0.42)", width: sel ? 1.7 : 1.1 };
  return { color: sel ? "rgba(255,255,255,0.35)" : COL.edge, width: sel ? 1.1 : 0.6 };
}

function paintNode(n, ctx, k) {
  const dim = isDim(n);
  const col = nodeColor(n);
  const a = dim ? 0.08 : 1;
  const hot = S.selected?.id === n.id || S.hovered?.id === n.id;

  /* ореол новизны — мягкое внешнее кольцо */
  if (!dim && (S.newSet.has(n.id) || S.touchedSet.has(n.id))) {
    ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.arc(n.x, n.y, n.r + 3.5 / k + 1.2, 0, 2 * Math.PI);
    ctx.strokeStyle = S.newSet.has(n.id) ? COL.new : COL.touched;
    ctx.lineWidth = 1.6 / k; ctx.stroke();
  }

  ctx.globalAlpha = a;
  if (hot && !dim) { ctx.shadowColor = col; ctx.shadowBlur = 14; }

  if (n.kind === "code") {                 /* код: модуль — квадрат, класс — ромб, ф-я/метод — круг */
    if (n.codeKind === "module") {
      const s = n.r * 1.7, x = n.x - s / 2, y = n.y - s / 2, rr = s * 0.3;
      ctx.beginPath(); ctx.roundRect(x, y, s, s, rr);
      ctx.fillStyle = col; ctx.fill();
    } else if (n.codeKind === "class") {
      const s = n.r * 1.05;
      ctx.beginPath();
      ctx.moveTo(n.x, n.y - s); ctx.lineTo(n.x + s, n.y); ctx.lineTo(n.x, n.y + s); ctx.lineTo(n.x - s, n.y);
      ctx.closePath(); ctx.fillStyle = col; ctx.fill();
    } else {                               /* function / method */
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, 2 * Math.PI);
      ctx.fillStyle = col; ctx.fill();
    }
  } else if (n.kind === "concept") {       /* пунктирный контур — страницы нет */
    ctx.setLineDash([2.5 / k, 2.5 / k]);
    ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, 2 * Math.PI);
    ctx.strokeStyle = COL.muted; ctx.lineWidth = 1.1 / k; ctx.stroke();
    ctx.setLineDash([]);
  } else if (n.kind === "tag") {           /* ромб */
    const s = n.r * 0.95;
    ctx.beginPath();
    ctx.moveTo(n.x, n.y - s); ctx.lineTo(n.x + s, n.y); ctx.lineTo(n.x, n.y + s); ctx.lineTo(n.x - s, n.y);
    ctx.closePath(); ctx.fillStyle = col; ctx.fill();
  } else if (n.kind === "org") {           /* скруглённый квадрат — папка */
    const s = n.r * 1.7, x = n.x - s / 2, y = n.y - s / 2, rr = s * 0.3;
    ctx.beginPath(); ctx.roundRect(x, y, s, s, rr);
    ctx.fillStyle = col; ctx.fill();
  } else {                                 /* заметка — круг */
    ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, 2 * Math.PI);
    ctx.fillStyle = col; ctx.fill();
    if (n.entity) {                        /* entity — двойное кольцо */
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r + 1.8 / k, 0, 2 * Math.PI);
      ctx.strokeStyle = col; ctx.globalAlpha = a * 0.55; ctx.lineWidth = 0.9 / k; ctx.stroke();
      ctx.globalAlpha = a;
    }
  }
  ctx.shadowBlur = 0;

  if (S.selected?.id === n.id) {
    ctx.beginPath(); ctx.arc(n.x, n.y, n.r + 4 / k + 1.5, 0, 2 * Math.PI);
    ctx.strokeStyle = COL.accent; ctx.lineWidth = 1.6 / k; ctx.stroke();
  }

  /* подписи: плавный fade по зуму, крупные и выделенные — раньше */
  const base = n.r >= 8 ? 0.4 : n.r >= 5 ? 0.7 : 1.05;
  let la = (k - base) * 2;
  if (S.selected?.id === n.id || hot || (S.term && !dim)) la = 1;
  la = Math.max(0, Math.min(1, la));
  if (la > 0.02 && !dim) {
    ctx.globalAlpha = la * 0.92;
    ctx.font = `${11 / k}px -apple-system, system-ui, sans-serif`;
    ctx.textAlign = "center"; ctx.textBaseline = "top";
    ctx.fillStyle = COL.text;
    ctx.fillText(n.label, n.x, n.y + n.r + 4 / k);
  }
  ctx.globalAlpha = 1;
}

function paintLinkLabel(l, ctx, k) {
  const code = l.layer === "code";
  /* знания: подписываем semantic. код: всё кроме скелета defines, но только при
     выделении/по чипу «связи» — иначе сотни «calls» превращаются в кашу */
  if (code) { if (l.relation === "defines") return; }
  else if (l.layer !== "semantic") return;
  const s = l.source, t = l.target;
  if (typeof s !== "object" || typeof t !== "object") return;
  const sel = S.selected && (s.id === S.selected.id || t.id === S.selected.id);
  if (isDim(s) && isDim(t)) return;

  let a = (S.alwaysEdgeLabels || sel) ? 1 : (code ? 0 : (k - 1.4) * 1.8);
  a = Math.max(0, Math.min(1, a));
  if (a < 0.03) return;

  const mx = (s.x + t.x) / 2, my = (s.y + t.y) / 2;
  let ang = Math.atan2(t.y - s.y, t.x - s.x);
  if (ang > Math.PI / 2 || ang < -Math.PI / 2) ang += Math.PI;  /* читаемо слева направо */

  const fs = 9.5 / k;
  ctx.save();
  ctx.translate(mx, my); ctx.rotate(ang);
  ctx.font = `${fs}px -apple-system, system-ui, sans-serif`;
  const w = ctx.measureText(l.relation).width;
  ctx.globalAlpha = a * 0.92;
  ctx.fillStyle = COL.panel;                       /* подложка-пилюля */
  ctx.beginPath();
  ctx.roundRect(-w / 2 - 4 / k, -fs * 0.75, w + 8 / k, fs * 1.5, fs * 0.75);
  ctx.fill();
  ctx.fillStyle = sel ? COL.accent : "#9d92cf";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(l.relation, 0, 0.5 / k);
  ctx.restore();
  ctx.globalAlpha = 1;
}

/* ── выбор узла, лист, превью ── */
function flyTo(n) {
  Graph.centerAt(n.x, n.y, 650);
  if (S.zoom < 1.8) Graph.zoom(2.1, 650);
}

function select(n, fly) {
  S.selected = n || null;
  $("preview").style.display = "none"; $("preview").innerHTML = "";
  if (!n) { $("sheet").classList.remove("open"); return; }
  if (fly) flyTo(n);

  $("sheet-title").textContent = n.label;
  const b = $("badges"); b.innerHTML = "";
  const add = (txt, cls) => {
    const s = document.createElement("span");
    s.className = "badge" + (cls ? " " + cls : ""); s.textContent = txt; b.append(s);
  };
  add(isCode() ? (CODE_RU[n.codeKind] || n.codeKind || "код") : (KIND_RU[n.kind] || n.kind));
  if (isCode() && n.file) add(n.line ? `${n.file}:${n.line}` : n.file);
  if (n.entity) add("entity", "acc");
  if (S.newSet.has(n.id)) add("новый", "new");
  else if (S.touchedSet.has(n.id)) add("изменён", "touched");
  add(`связей: ${n.degree}`);

  const conns = $("conns"); conns.innerHTML = "";
  const incident = S.links.filter((l) => l.source.id === n.id || l.target.id === n.id);
  incident.sort((a, b2) => (a.layer === "semantic" ? 0 : 1) - (b2.layer === "semantic" ? 0 : 1));
  if (incident.length) {
    const sec = document.createElement("div"); sec.className = "sec";
    sec.textContent = "Связи"; conns.append(sec);
  }
  for (const l of incident.slice(0, 80)) {
    const other = l.source.id === n.id ? l.target : l.source;
    const row = document.createElement("div"); row.className = "conn";
    const rel = document.createElement("span");
    rel.className = "rel" + (l.layer === "semantic" ? " sem" : "");
    rel.textContent = l.relation;
    const who = document.createElement("span"); who.className = "who";
    const cd = document.createElement("span"); cd.className = "cdot";
    cd.style.background = nodeColor(other);
    who.append(cd, document.createTextNode(other.label));
    row.append(rel, who);
    row.onclick = () => select(other, true);
    conns.append(row);
  }
  $("open-note").style.display = (n.kind === "note" || n.kind === "org") ? "block" : "none";
  $("sheet").classList.add("open");
}

$("sheet-head").onclick = () => select(null);

/* markdown: [[wikilinks]] → кликабельные ссылки, frontmatter — долой */
function renderMd(md) {
  md = md.replace(/^---\n[\s\S]*?\n---\n?/, "");
  md = md.replace(/!?\[\[([^\]|#]+)(?:#[^\]|]*)?(?:\|([^\]]+))?\]\]/g, (_, target, alias) => {
    const t = target.trim().replace(/"/g, "&quot;");
    const text = (alias || target).trim();
    return `<a class="wl" data-wl="${t}">${text}</a>`;
  });
  const html = marked.parse(md, { breaks: true });
  return DOMPurify.sanitize(html, { ADD_ATTR: ["data-wl"] });
}

function findByName(name) {
  const low = name.toLowerCase();
  return S.nodes.find((n) => n.id.toLowerCase() === low + ".md") ||
         S.nodes.find((n) => n.label.toLowerCase() === low) ||
         S.nodes.find((n) => n.id.toLowerCase().endsWith("/" + low + ".md"));
}

$("preview").addEventListener("click", (ev) => {
  const a = ev.target.closest("a.wl");
  if (!a) return;
  ev.preventDefault();
  const n = findByName(a.dataset.wl || "");
  if (n) select(n, true);
});

$("open-note").onclick = async () => {
  const n = S.selected; if (!n) return;
  const btn = $("open-note"); btn.disabled = true; btn.textContent = "Загружаю…";
  try {
    const r = DEMO
      ? { content: "# Демо\nПревью с **markdown**, `кодом` и [[Знания/AI/RAG|вики-ссылкой]].\n> и цитатой", truncated: false }
      : await api("/api/preview", { node: n.id });
    $("preview").innerHTML = renderMd(r.content) +
      (r.truncated ? '<div class="trunc">… показано начало заметки</div>' : "");
    $("preview").style.display = "block";
  } catch (e) {
    $("preview").innerHTML = `<span style="color:var(--danger)">Не получилось: ${e.message}</span>`;
    $("preview").style.display = "block";
  } finally { btn.disabled = false; btn.textContent = "Открыть заметку"; }
};

/* ── чипы ── */
$("chip-new").onclick = () => {
  S.filterNew = !S.filterNew; $("chip-new").classList.toggle("on", S.filterNew);
};
$("chip-touched").onclick = () => {
  S.filterTouched = !S.filterTouched; $("chip-touched").classList.toggle("on", S.filterTouched);
};
$("chip-labels").onclick = () => {
  S.alwaysEdgeLabels = !S.alwaysEdgeLabels; $("chip-labels").classList.toggle("on", S.alwaysEdgeLabels);
};

/* ── поиск с подсказками ── */
const sug = $("suggest");
$("search").addEventListener("input", (ev) => {
  S.term = ev.target.value.trim().toLowerCase();
  sug.innerHTML = "";
  if (!S.term) { sug.style.display = "none"; return; }
  const hits = S.nodes.filter((n) => n.label.toLowerCase().includes(S.term)).slice(0, 7);
  for (const n of hits) {
    const row = document.createElement("div"); row.className = "sug";
    const d = document.createElement("span"); d.className = "dot"; d.style.background = nodeColor(n);
    const t = document.createElement("span"); t.textContent = n.label;
    const k = document.createElement("span"); k.className = "kind";
    k.textContent = isCode() ? (CODE_RU[n.codeKind] || n.codeKind || "код") : (KIND_RU[n.kind] || n.kind);
    row.append(d, t, k);
    row.onclick = () => {
      sug.style.display = "none"; $("search").value = n.label; S.term = "";
      select(n, true);
    };
    sug.append(row);
  }
  sug.style.display = hits.length ? "block" : "none";
});
$("search").addEventListener("keydown", (ev) => {
  if (ev.key !== "Enter") return;
  const n = S.nodes.find((x) => x.label.toLowerCase().includes(S.term));
  sug.style.display = "none";
  if (n) { S.term = ""; $("search").value = n.label; select(n, true); }
  ev.target.blur();
});
document.addEventListener("click", (ev) => {
  if (!ev.target.closest("#searchbox")) sug.style.display = "none";
});

addEventListener("resize", () => Graph?.width(innerWidth).height(innerHeight));
load();
</script>
</body>
</html>
