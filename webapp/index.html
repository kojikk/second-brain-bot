<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Граф вольта</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #131517);
    --bg2: var(--tg-theme-secondary-bg-color, #1c1f23);
    --text: var(--tg-theme-text-color, #e8eaed);
    --hint: var(--tg-theme-hint-color, #8a9097);
    --accent: var(--tg-theme-button-color, #5b8def);
    --accent-text: var(--tg-theme-button-text-color, #ffffff);
    --new: #4cab6d;
    --touched: #c99a3c;
    --sep: color-mix(in srgb, var(--hint) 25%, transparent);
  }
  * { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.45 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
  }
  #canvas { position: absolute; inset: 0; touch-action: none; }

  /* ── верхняя панель ── */
  #top {
    position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    padding: 10px 12px 8px; display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  #top > * { pointer-events: auto; }
  #search {
    width: 100%; padding: 9px 12px; border-radius: 10px; border: 1px solid var(--sep);
    background: var(--bg2); color: var(--text); font-size: 15px; outline: none;
  }
  #search::placeholder { color: var(--hint); }
  #chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    padding: 5px 10px; border-radius: 999px; font-size: 12.5px;
    background: var(--bg2); color: var(--hint); border: 1px solid var(--sep);
    cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 6px;
  }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; }
  .chip.on { color: var(--text); border-color: var(--accent); }
  #status { font-size: 12px; color: var(--hint); }
  #status .stale { color: var(--touched); }

  /* ── нижний лист ── */
  #sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 6;
    background: var(--bg2); border-radius: 14px 14px 0 0;
    border-top: 1px solid var(--sep);
    transform: translateY(100%); transition: transform .22s ease;
    max-height: 62%; display: flex; flex-direction: column;
  }
  #sheet.open { transform: translateY(0); }
  #sheet-head { padding: 12px 16px 8px; flex: none; }
  #sheet-grip {
    width: 34px; height: 4px; border-radius: 2px; background: var(--sep);
    margin: 0 auto 10px;
  }
  #sheet-title { font-size: 16px; font-weight: 600; word-break: break-word; }
  #sheet-sub { font-size: 12.5px; color: var(--hint); margin-top: 2px; }
  #sheet-body { overflow-y: auto; padding: 4px 16px 16px; }
  .conn {
    display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--sep);
    align-items: baseline; cursor: pointer;
  }
  .conn:last-child { border-bottom: 0; }
  .conn .rel { flex: none; font-size: 12px; color: var(--hint); min-width: 84px; }
  .conn .rel.sem { color: var(--accent); }
  .conn .who { word-break: break-word; }
  .btn {
    display: block; width: 100%; margin: 10px 0 2px; padding: 10px;
    border: 0; border-radius: 10px; background: var(--accent); color: var(--accent-text);
    font-size: 15px; font-weight: 500; cursor: pointer;
  }
  .btn[disabled] { opacity: .5; }
  #preview {
    margin-top: 10px; padding: 10px 12px; border-radius: 10px;
    background: var(--bg); border: 1px solid var(--sep);
    font: 12.5px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    white-space: pre-wrap; word-break: break-word; color: var(--text);
    max-height: 38vh; overflow-y: auto; display: none;
  }
  #overlay {
    position: absolute; inset: 0; z-index: 10; display: flex;
    align-items: center; justify-content: center; flex-direction: column; gap: 10px;
    background: var(--bg); color: var(--hint); text-align: center; padding: 24px;
  }
  .spin {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--sep); border-top-color: var(--accent);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="top">
  <input id="search" type="search" placeholder="Найти узел…" autocomplete="off">
  <div id="chips">
    <span class="chip" id="chip-new"><span class="dot" style="background:var(--new)"></span>новые <b id="n-new">0</b></span>
    <span class="chip" id="chip-touched"><span class="dot" style="background:var(--touched)"></span>затронутые <b id="n-touched">0</b></span>
    <span class="chip" id="chip-labels">подписи связей</span>
  </div>
  <div id="status"></div>
</div>

<div id="sheet">
  <div id="sheet-head">
    <div id="sheet-grip"></div>
    <div id="sheet-title"></div>
    <div id="sheet-sub"></div>
  </div>
  <div id="sheet-body">
    <div id="conns"></div>
    <button class="btn" id="open-note" type="button">Открыть заметку</button>
    <div id="preview"></div>
  </div>
</div>

<div id="overlay"><div class="spin"></div><div id="overlay-text">Загружаю граф…</div></div>

<script>
"use strict";
const tg = window.Telegram?.WebApp;
tg?.ready(); tg?.expand();

const $ = (id) => document.getElementById(id);
const canvas = $("canvas"), ctx = canvas.getContext("2d");
let DPR = Math.min(window.devicePixelRatio || 1, 2);

/* Приглушённая палитра сообществ — без неона. */
const PALETTE = ["#5b8def","#5fae8c","#c98a5b","#a37fd1","#cd6f6f",
                 "#5aa7c4","#b8a04e","#7f8fa6","#9f6f9c","#6c9a6c"];

const state = {
  nodes: [], edges: [], byId: new Map(),
  diff: { new_nodes: [], touched_nodes: [], new_edges: [] },
  newSet: new Set(), touchedSet: new Set(), newEdgeSet: new Set(),
  selected: null, hoverEdges: [],
  cam: { x: 0, y: 0, k: 1 },
  filterNew: false, filterTouched: false, edgeLabels: false,
  alpha: 0, running: false, searchTerm: "",
};

/* ── загрузка ── */
async function api(path, body) {
  const r = await fetch(path, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ initData: tg?.initData || "", ...body }),
  });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || ("HTTP " + r.status));
  return r.json();
}

async function load() {
  try {
    const data = await api("/api/graph", {});
    initGraph(data);
    $("overlay").style.display = "none";
  } catch (e) {
    $("overlay-text").textContent = "Не получилось: " + e.message;
    document.querySelector(".spin").style.display = "none";
  }
}

function initGraph(data) {
  const g = data.graph;
  state.diff = data.diff || state.diff;
  state.newSet = new Set(state.diff.new_nodes || []);
  state.touchedSet = new Set((state.diff.touched_nodes || []));
  state.newEdgeSet = new Set((state.diff.new_edges || []).map(e => e.src + "|" + e.tgt));

  state.nodes = g.nodes.map((n, i) => ({
    ...n,
    x: Math.cos(i * 2.39996) * Math.sqrt(i) * 26,   /* phyllotaxis seed */
    y: Math.sin(i * 2.39996) * Math.sqrt(i) * 26,
    vx: 0, vy: 0,
    r: 4 + Math.sqrt(n.degree || 1) * 2.2,
  }));
  state.byId = new Map(state.nodes.map(n => [n.id, n]));
  state.edges = g.edges.filter(e => state.byId.has(e.src) && state.byId.has(e.tgt));

  $("n-new").textContent = state.newSet.size;
  $("n-touched").textContent = state.touchedSet.size;
  const when = (g.generated || "").slice(0, 16).replace("T", " ");
  $("status").innerHTML =
    `${g.stats.nodes} узлов · ${g.stats.edges} связей · ${when}` +
    (data.stale ? ` · <span class="stale">офлайн-снапшот</span>` : "");

  fitCamera();
  heat(1);
}

/* ── форс-симуляция (velocity Verlet, O(n²) — персональный масштаб) ── */
const SPRING = 0.06, SPRING_LEN = 46, REPULSE = 900, GRAVITY = 0.015, DAMP = 0.86;

function heat(a) { state.alpha = Math.max(state.alpha, a); if (!state.running) { state.running = true; requestAnimationFrame(frame); } }

function tickPhysics() {
  const N = state.nodes;
  for (let i = 0; i < N.length; i++) {
    const a = N[i];
    for (let j = i + 1; j < N.length; j++) {
      const b = N[j];
      let dx = a.x - b.x, dy = a.y - b.y;
      let d2 = dx * dx + dy * dy || 0.01;
      if (d2 > 90000) continue;                 /* дальние пары не толкаются */
      const f = REPULSE / d2;
      const d = Math.sqrt(d2);
      dx /= d; dy /= d;
      a.vx += dx * f; a.vy += dy * f;
      b.vx -= dx * f; b.vy -= dy * f;
    }
  }
  for (const e of state.edges) {
    const a = state.byId.get(e.src), b = state.byId.get(e.tgt);
    let dx = b.x - a.x, dy = b.y - a.y;
    const d = Math.sqrt(dx * dx + dy * dy) || 1;
    const f = SPRING * (d - SPRING_LEN) / d;
    a.vx += dx * f; a.vy += dy * f;
    b.vx -= dx * f; b.vy -= dy * f;
  }
  for (const n of N) {
    n.vx -= n.x * GRAVITY; n.vy -= n.y * GRAVITY;
    if (n === dragNode) { n.vx = 0; n.vy = 0; continue; }
    n.vx *= DAMP; n.vy *= DAMP;
    n.x += n.vx * state.alpha; n.y += n.vy * state.alpha;
  }
  state.alpha *= 0.985;
}

/* ── отрисовка ── */
function nodeColor(n) {
  if (n.kind === "tag") return "#7f8fa6";
  if (n.kind === "concept") return "transparent";
  return PALETTE[(n.community ?? 0) % PALETTE.length];
}

function dimmed(n) {
  if (state.searchTerm) return !n.label.toLowerCase().includes(state.searchTerm);
  if (state.filterNew || state.filterTouched) {
    return !((state.filterNew && state.newSet.has(n.id)) ||
             (state.filterTouched && state.touchedSet.has(n.id)));
  }
  if (state.selected) {
    return n.id !== state.selected.id &&
           !state.hoverEdges.some(e => e.src === n.id || e.tgt === n.id);
  }
  return false;
}

function frame() {
  if (state.alpha > 0.02) tickPhysics();
  draw();
  if (state.alpha > 0.02 || dragNode) requestAnimationFrame(frame);
  else state.running = false;
}

function draw() {
  const w = canvas.width / DPR, h = canvas.height / DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, w, h);
  const { x: cx, y: cy, k } = state.cam;
  ctx.translate(w / 2 + cx, h / 2 + cy);
  ctx.scale(k, k);

  const cs = getComputedStyle(document.body);
  const hint = cs.getPropertyValue("--hint").trim() || "#8a9097";
  const accent = cs.getPropertyValue("--accent").trim() || "#5b8def";
  const cNew = cs.getPropertyValue("--new").trim(), cTouch = cs.getPropertyValue("--touched").trim();
  const showEdgeLabels = state.edgeLabels && k > 0.9;

  /* рёбра */
  for (const e of state.edges) {
    const a = state.byId.get(e.src), b = state.byId.get(e.tgt);
    const sel = state.selected && (e.src === state.selected.id || e.tgt === state.selected.id);
    const isNew = state.newEdgeSet.has(e.src + "|" + e.tgt);
    const aDim = dimmed(a), bDim = dimmed(b);
    ctx.globalAlpha = (aDim && bDim) ? 0.06 : (sel ? 0.9 : (e.layer === "semantic" ? 0.55 : 0.22));
    ctx.strokeStyle = isNew ? cNew : (e.layer === "semantic" ? accent : hint);
    ctx.lineWidth = (e.layer === "semantic" ? 1.4 : 0.7) / k + (sel ? 0.6 / k : 0);
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();

    if ((showEdgeLabels || sel) && e.layer === "semantic" && !(aDim && bDim)) {
      ctx.globalAlpha = sel ? 0.95 : 0.7;
      ctx.fillStyle = accent;
      ctx.font = `${10.5 / k}px system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.fillText(e.relation, (a.x + b.x) / 2, (a.y + b.y) / 2 - 3 / k);
    }
  }

  /* узлы */
  for (const n of state.nodes) {
    const dim = dimmed(n);
    ctx.globalAlpha = dim ? 0.13 : 1;
    const col = nodeColor(n);

    /* ореол новизны */
    if (!dim && (state.newSet.has(n.id) || state.touchedSet.has(n.id))) {
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r + 4 / k, 0, 7);
      ctx.strokeStyle = state.newSet.has(n.id) ? cNew : cTouch;
      ctx.lineWidth = 2 / k; ctx.globalAlpha = dim ? 0.13 : 0.85; ctx.stroke();
      ctx.globalAlpha = dim ? 0.13 : 1;
    }

    ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, 7);
    if (n.kind === "concept") {                 /* концепт без страницы — пунктир */
      ctx.setLineDash([3 / k, 3 / k]);
      ctx.strokeStyle = hint; ctx.lineWidth = 1.2 / k; ctx.stroke();
      ctx.setLineDash([]);
    } else {
      ctx.fillStyle = col; ctx.fill();
      if (n.entity) { ctx.strokeStyle = "rgba(255,255,255,.7)"; ctx.lineWidth = 1.2 / k; ctx.stroke(); }
    }
    if (state.selected?.id === n.id) {
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r + 2.5 / k, 0, 7);
      ctx.strokeStyle = accent; ctx.lineWidth = 2 / k; ctx.stroke();
    }

    /* подписи: крупные узлы, выбранный, найденные, либо все при зуме */
    const labelled = !dim && (k > 1.5 || n.r > 9 || state.selected?.id === n.id ||
                              (state.searchTerm && !dim));
    if (labelled) {
      ctx.fillStyle = cs.getPropertyValue("--text").trim() || "#e8eaed";
      ctx.globalAlpha = dim ? 0.13 : 0.9;
      ctx.font = `${11 / k}px system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.fillText(n.label, n.x, n.y + n.r + 12 / k);
    }
  }
  ctx.globalAlpha = 1;
}

function fitCamera() {
  if (!state.nodes.length) return;
  let minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
  for (const n of state.nodes) {
    minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x);
    minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y);
  }
  const w = canvas.width / DPR, h = canvas.height / DPR;
  const k = Math.min(w / (maxX - minX + 120), h / (maxY - minY + 220), 2);
  state.cam = { x: -(minX + maxX) / 2 * k, y: -(minY + maxY) / 2 * k, k };
}

/* ── ввод: пан/зум/драг/тап ── */
let dragNode = null;
const pointers = new Map();
let pinchBase = null;

function toWorld(px, py) {
  const w = canvas.width / DPR, h = canvas.height / DPR;
  return {
    x: (px - w / 2 - state.cam.x) / state.cam.k,
    y: (py - h / 2 - state.cam.y) / state.cam.k,
  };
}
function hit(px, py) {
  const p = toWorld(px, py);
  let best = null, bestD = 1e9;
  for (const n of state.nodes) {
    const d = Math.hypot(n.x - p.x, n.y - p.y);
    if (d < Math.max(n.r + 6 / state.cam.k, 12 / state.cam.k) && d < bestD) { best = n; bestD = d; }
  }
  return best;
}

canvas.addEventListener("pointerdown", (ev) => {
  canvas.setPointerCapture(ev.pointerId);
  pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY, moved: false });
  if (pointers.size === 1) {
    dragNode = hit(ev.clientX, ev.clientY);
    if (dragNode) heat(0.3);
  } else { dragNode = null; pinchBase = null; }
});
canvas.addEventListener("pointermove", (ev) => {
  const p = pointers.get(ev.pointerId);
  if (!p) return;
  const dx = ev.clientX - p.x, dy = ev.clientY - p.y;
  if (Math.hypot(dx, dy) > 4) p.moved = true;

  if (pointers.size === 2) {
    const pts = [...pointers.entries()].map(([id, q]) =>
      id === ev.pointerId ? { x: ev.clientX, y: ev.clientY } : q);
    const d = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    const cx = (pts[0].x + pts[1].x) / 2, cy = (pts[0].y + pts[1].y) / 2;
    if (!pinchBase) {
      pinchBase = { d, k: state.cam.k, x: state.cam.x, y: state.cam.y, cx, cy };
    } else {
      /* зум вокруг центра щипка: мировая точка под пальцами не уезжает */
      const w = canvas.width / DPR, h = canvas.height / DPR;
      const k = Math.min(6, Math.max(0.15, pinchBase.k * (d / pinchBase.d)));
      const wx = (pinchBase.cx - w / 2 - pinchBase.x) / pinchBase.k;
      const wy = (pinchBase.cy - h / 2 - pinchBase.y) / pinchBase.k;
      state.cam.k = k;
      state.cam.x = cx - w / 2 - wx * k;
      state.cam.y = cy - h / 2 - wy * k;
      requestDraw();
    }
  } else if (dragNode) {
    const w = toWorld(ev.clientX, ev.clientY);
    dragNode.x = w.x; dragNode.y = w.y; heat(0.25);
  } else if (p.moved) {
    state.cam.x += dx; state.cam.y += dy;
    requestDraw();
  }
  p.x = ev.clientX; p.y = ev.clientY;
});
canvas.addEventListener("pointerup", (ev) => {
  const p = pointers.get(ev.pointerId);
  pointers.delete(ev.pointerId); pinchBase = null;
  if (p && !p.moved && pointers.size === 0) {
    const n = hit(ev.clientX, ev.clientY);
    select(n);
  }
  dragNode = null;
});
canvas.addEventListener("pointercancel", (ev) => { pointers.delete(ev.pointerId); dragNode = null; pinchBase = null; });
canvas.addEventListener("wheel", (ev) => {
  ev.preventDefault();
  const w = canvas.width / DPR, h = canvas.height / DPR;
  const k = Math.min(6, Math.max(0.15, state.cam.k * (ev.deltaY < 0 ? 1.12 : 0.89)));
  /* зум вокруг курсора */
  const wx = (ev.clientX - w / 2 - state.cam.x) / state.cam.k;
  const wy = (ev.clientY - h / 2 - state.cam.y) / state.cam.k;
  state.cam.x = ev.clientX - w / 2 - wx * k;
  state.cam.y = ev.clientY - h / 2 - wy * k;
  state.cam.k = k; requestDraw();
}, { passive: false });

let drawQueued = false;
function requestDraw() {
  if (state.running || drawQueued) return;
  drawQueued = true;
  requestAnimationFrame(() => { drawQueued = false; draw(); });
}

/* ── выбор узла / лист ── */
const KIND_RU = { note: "заметка", org: "узел-папка", tag: "тег", concept: "концепт без страницы" };

function select(n) {
  state.selected = n || null;
  state.hoverEdges = n ? state.edges.filter(e => e.src === n.id || e.tgt === n.id) : [];
  $("preview").style.display = "none"; $("preview").textContent = "";
  if (!n) { $("sheet").classList.remove("open"); requestDraw(); return; }

  $("sheet-title").textContent = n.label;
  const badges = [KIND_RU[n.kind] || n.kind];
  if (n.entity) badges.push("entity");
  if (state.newSet.has(n.id)) badges.push("новый");
  else if (state.touchedSet.has(n.id)) badges.push("изменён");
  $("sheet-sub").textContent = `${badges.join(" · ")} · связей: ${n.degree}`;

  const conns = $("conns"); conns.innerHTML = "";
  for (const e of state.hoverEdges.slice(0, 60)) {
    const otherId = e.src === n.id ? e.tgt : e.src;
    const other = state.byId.get(otherId);
    const row = document.createElement("div"); row.className = "conn";
    const rel = document.createElement("span");
    rel.className = "rel" + (e.layer === "semantic" ? " sem" : "");
    rel.textContent = e.relation;
    const who = document.createElement("span"); who.className = "who";
    who.textContent = other?.label || otherId;
    row.append(rel, who);
    row.onclick = () => { select(other); centerOn(other); };
    conns.append(row);
  }
  $("open-note").style.display = (n.kind === "note" || n.kind === "org") ? "block" : "none";
  $("sheet").classList.add("open");
  requestDraw();
}

function centerOn(n) {
  if (!n) return;
  state.cam.x = -n.x * state.cam.k;
  state.cam.y = -n.y * state.cam.k + canvas.height / DPR * 0.1;
  requestDraw();
}

$("open-note").onclick = async () => {
  const n = state.selected; if (!n) return;
  const btn = $("open-note"); btn.disabled = true; btn.textContent = "Загружаю…";
  try {
    const r = await api("/api/preview", { node: n.id });
    $("preview").textContent = r.content + (r.truncated ? "\n\n… (обрезано)" : "");
    $("preview").style.display = "block";
  } catch (e) {
    $("preview").textContent = "Не получилось: " + e.message;
    $("preview").style.display = "block";
  } finally { btn.disabled = false; btn.textContent = "Открыть заметку"; }
};

$("sheet-head").onclick = () => select(null);

/* ── чипы и поиск ── */
$("chip-new").onclick = () => {
  state.filterNew = !state.filterNew; $("chip-new").classList.toggle("on", state.filterNew); requestDraw();
};
$("chip-touched").onclick = () => {
  state.filterTouched = !state.filterTouched; $("chip-touched").classList.toggle("on", state.filterTouched); requestDraw();
};
$("chip-labels").onclick = () => {
  state.edgeLabels = !state.edgeLabels; $("chip-labels").classList.toggle("on", state.edgeLabels); requestDraw();
};
$("search").oninput = (ev) => {
  state.searchTerm = ev.target.value.trim().toLowerCase();
  requestDraw();
};
$("search").onkeydown = (ev) => {
  if (ev.key !== "Enter" || !state.searchTerm) return;
  const n = state.nodes.find(x => x.label.toLowerCase().includes(state.searchTerm));
  if (n) { select(n); centerOn(n); }
  ev.target.blur();
};

/* ── размер ── */
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = innerWidth * DPR; canvas.height = innerHeight * DPR;
  canvas.style.width = innerWidth + "px"; canvas.style.height = innerHeight + "px";
  requestDraw();
}
addEventListener("resize", resize);
resize();
load();
</script>
</body>
</html>
